
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ thống Quản lý Hồ sơ Chuyển đổi Số</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header-banner text-center text-white py-4 mb-4">
    <div class="container">
      <h1 class="h3 fw-bold"><i class="fa-cloud fa-solid me-2"></i> Hệ thống Quản lý Hồ sơ Chuyển đổi Số</h1>
      <p class="mb-0 opacity-75 small">Sở Giáo dục & Đào tạo — Ứng dụng quản lý tiến trình chuyển đổi số các trường học</p>
    </div>
  </header>

  <main class="container mb-5">
    <div class="row g-4">
      
      <section class="col-lg-4">
        <div class="card card-custom p-4 shadow-sm">
          <h2 class="h5 card-form-title mb-4"><i class="fa-regular fa-circle-plus me-2"></i>Thêm hồ sơ mới</h2>
          <form id="recordForm">
            
            <div class="mb-3">
              <label for="schoolName" class="form-label text-secondary small fw-bold">Tên trường</label>
              <input type="text" class="form-control" id="schoolName" placeholder="VD: Trường THPT Nguyễn Huệ">
            </div>

            <div class="mb-3">
              <label for="managementUnit" class="form-label text-secondary small fw-bold">Đơn vị quản lý</label>
              <select class="form-select" id="managementUnit">
                <option value="" selected>-- Chọn đơn vị --</option>
                <option value="Phòng GD&ĐT TP. Thủy Lợi">Phòng GD&ĐT TP. Thủy Lợi</option>
                <option value="Phòng GD&ĐT H. Thủy Nguyên">Phòng GD&ĐT H. Thủy Nguyên</option>
                <option value="Phòng GD&ĐT Q. Hồng Bàng">Phòng GD&ĐT Q. Hồng Bàng</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="status" class="form-label text-secondary small fw-bold">Trạng thái chuyển đổi</label>
              <select class="form-select" id="status">
                <option value="" selected>-- Chọn trạng thái --</option>
                <option value="Chưa bắt đầu">Chưa bắt đầu</option>
                <option value="Đang triển khai">Đang triển khai</option>
                <option value="Hoàn thành">Hoàn thành</option>
              </select>
            </div>

            <div class="mb-4">
              <label for="description" class="form-label text-secondary small fw-bold">Mô tả tiến độ</label>
              <textarea class="form-control" id="description" rows="4" placeholder="Mô tả tình hình chuyển đổi số..."></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold py-2"><i class="fa-solid fa-plus me-2"></i>Thêm hồ sơ</button>
          </form>
        </div>
      </section>

      <section class="col-lg-8">
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-2">
          <div class="d-flex flex-wrap gap-2" id="filterTabs">
            <button class="btn btn-filter active px-3 py-1.5 rounded-pill" data-filter="Tất cả">Tất cả</button>
            <button class="btn btn-filter px-3 py-1.5 rounded-pill" data-filter="Chưa bắt đầu">Chưa bắt đầu</button>
            <button class="btn btn-filter px-3 py-1.5 rounded-pill" data-filter="Đang triển khai">Đang triển khai</button>
            <button class="btn btn-filter px-3 py-1.5 rounded-pill" data-filter="Hoàn thành">Hoàn thành</button>
          </div>
          <div>
            <span class="badge bg-primary rounded-pill px-3 py-2 fw-bold" id="totalBadge"><i class="fa-solid fa-list-ul me-2"></i>7 hồ sơ</span>
          </div>
        </div>

        <div class="d-flex flex-column gap-3" id="recordsContainer">
          </div>
      </section>

    </div>
  </main>

  <script src="data/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
